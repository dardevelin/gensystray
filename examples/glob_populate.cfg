# dynamic sections populated from filesystem via glob
# watch = true re-expands when files are added or removed

tray {
  icon    = "gensystray_default.png"
  tooltip = "Glob Populate"
}

# populate from glob with string command template
section "Notes" {
  expanded = true

  populate {
    from    = "glob"
    pattern = "~/Documents/*.md"
    watch   = true
    depth   = 0
    hierarchy = false

    item {
      label   = "{filename}"
      command = "xdg-open {filepath}"
    }
  }
}

# populate with array command template
section "Source Files" {
  expanded = true

  populate {
    from    = "glob"
    pattern = "~/projects/myapp/src/*.c"
    watch   = true

    item {
      label   = "{filename}"
      command = ["vim", "{filepath}"]
    }
  }
}

# multiple populate blocks in one section
section "Documents" {
  expanded = true

  populate {
    from    = "glob"
    pattern = "~/docs/*.md"
    watch   = true
    item {
      label   = "{filename}"
      command = "xdg-open {filepath}"
    }
  }

  populate {
    from    = "glob"
    pattern = "~/docs/*.pdf"
    watch   = true
    item {
      label   = "{filename}"
      command = ["zathura", "{filepath}"]
    }
  }
}
