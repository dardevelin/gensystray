# live tray icon example
# update_tray_icon runs a command on each tick; stdout is the new icon path.
# an empty or failed stdout leaves the icon unchanged.
# the icon resets to the parsed default on config reload.
#
# run from the gensystray build directory:
#   GENSYSTRAY_PATH=./examples/live_tray_icon.cfg ./gensystray
#
# this example cycles through three icons every 2 seconds using a shell script
# that picks an icon based on the current second mod 3.

tray {
  icon    = "./gensystray_default.png"
  tooltip = "Live Icon Test"
}

item "IconCycle" {
  live {
    refresh          = "2s"
    update_label     = "date '+%H:%M:%S'"
    update_tray_icon = "sh -c 'case $(( $(date +%S) % 3 )) in 0) echo ./gensystray_default.png;; 1) echo ./gensystray_alert.png;; 2) echo ./gensystray_notify.png;; esac'"
  }
}
