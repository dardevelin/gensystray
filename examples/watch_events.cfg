# watch_events.cfg — react to filesystem changes in watched directories
#
# on watch-change, on watch-create, and on watch-delete fire commands
# when files change in a section's watched populate source.
#
# {filepath} and {filename} are substituted with the path that triggered
# the event. requires at least one populate block with watch = true.

tray {
    icon    = "folder"
    tooltip = "Watch Events Demo"
}

# --- notify on file changes ---

section "Notes" {
    expanded = true
    populate {
        from    = "glob"
        pattern = "~/Documents/notes/*.md"
        watch   = true
        item { label = "{filename}"; command = "xdg-open {filepath}" }
    }

    on watch-create { command = "notify-send 'New note' '{filename}'" }
    on watch-delete { command = "notify-send 'Note removed' '{filename}'" }
    on watch-change { command = "notify-send 'Note updated' '{filename}'" }
}

# --- auto-compile on save ---

section "LaTeX" {
    expanded = true
    populate {
        from    = "glob"
        pattern = "~/thesis/*.tex"
        watch   = true
        item { label = "{filename}"; command = "xdg-open {filepath}" }
    }

    on watch-change { command = "cd ~/thesis && make" }
}

# --- react to new downloads ---

section "Downloads" {
    expanded = true
    populate {
        from    = "glob"
        pattern = "~/Downloads/*.pdf"
        watch   = true
        item { label = "{filename}"; command = "evince {filepath}" }
    }

    on watch-create { command = "notify-send 'New download' '{filename}'" }
    on watch-delete { command = "notify-send 'Download cleaned' '{filename}'" }
}
