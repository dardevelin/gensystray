# emit_signals.cfg — custom signals with payloads
#
# emit fires an ss_lib signal from any action context (item click,
# on exit/output transitions, on watch-* events, or on emit chains).
#
# on emit "signal" { } blocks receive signals and can run commands
# with {value} substitution, or chain to another emit.
#
# prefix signal names with "global." for cross-instance delivery.

tray {
    icon    = "system-run"
    tooltip = "Emit Signals Demo"
}

# --- item click emits a signal ---

item "Deploy Production" {
    command = "deploy.sh production"
    emit { signal = "deploy"; value = "production" }
}

item "Deploy Staging" {
    command = "deploy.sh staging"
    emit { signal = "deploy"; value = "staging" }
}

# --- section reacts to the signal ---

section "Notifications" {
    expanded = true

    on emit "deploy" {
        command = "notify-send 'Deploy started' '{value}'"
    }
}

# --- live item emits on state transition ---

section "Monitoring" {
    expanded = true

    item "VPN" {
        live {
            refresh = "10s"
            update_label = "pgrep -x openvpn > /dev/null && echo connected || echo disconnected"
            on output "connected" {
                label = "VPN: up"
                emit { signal = "vpn_status"; value = "up" }
            }
            on output "disconnected" {
                label = "VPN: down"
                emit { signal = "vpn_status"; value = "down" }
            }
        }
    }

    on emit "vpn_status" {
        command = "notify-send 'VPN' '{value}'"
    }
}

# --- watch event emits, another section reacts ---

section "Notes" {
    expanded = true
    populate {
        from    = "glob"
        pattern = "~/Documents/notes/*.md"
        watch   = true
        item { label = "{filename}"; command = "xdg-open {filepath}" }
    }

    on watch-create {
        command = "echo 'new note: {filename}'"
        emit { signal = "notes_changed"; value = "{filename}" }
    }
}

section "Dashboard" {
    expanded = true

    on emit "notes_changed" {
        command = "notify-send 'Note activity' '{value}'"
    }
}

# --- emit chaining: one signal triggers another ---

section "Pipeline" {
    expanded = true

    item "Build" {
        command = "make build"
        emit { signal = "build_done"; value = "success" }
    }

    on emit "build_done" {
        command = "make test"
        emit { signal = "tests_done"; value = "{value}" }
    }

    on emit "tests_done" {
        command = "notify-send 'Pipeline complete' 'build: {value}'"
    }
}
