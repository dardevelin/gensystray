# tray icon reload example
# demonstrates that changing the icon path in the config and saving
# immediately updates the tray icon without restarting gensystray.
#
# to test (run from the gensystray build directory):
#   GENSYSTRAY_PATH=./examples/tray_icon_reload.cfg ./gensystray
#
# change the icon line below and save — the tray icon updates live.
# icon paths must be relative (./file.png) or absolute (/path/to/file.png).
# bare names (e.g. "foo.png") are treated as XDG theme icon names.
#
# available test icons (in the build directory):
#   ./gensystray_default.png  — default grey icon
#   ./gensystray_alert.png    — alert state
#   ./gensystray_notify.png   — notification state

tray {
  icon    = "./gensystray_default.png"
  tooltip = "Icon Reload Test"
}

item "separator" {
  separator = true
}

item "Clock" {
  live {
    refresh      = "1s"
    update_label = "date '+%H:%M:%S'"
  }
}
