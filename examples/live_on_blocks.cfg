# live items with on blocks — label reacts to exit code or output
# on blocks fire their command only on state transition, not every tick

tray {
  icon    = "gensystray_default.png"
  tooltip = "Live + On Blocks"
}

# --- clock variants ---

# 12-hour clock with AM/PM
item "Clock 12h" {
  command = ["xterm", "-e", "cal"]
  live {
    refresh      = "1s"
    update_label = "date '+%I:%M:%S %p'"
  }
}

# 24-hour clock
item "Clock 24h" {
  live {
    refresh      = "1s"
    update_label = "date '+%H:%M:%S'"
  }
}

# date only
item "Date" {
  live {
    refresh      = "60s"
    update_label = "date '+%Y-%m-%d'"
  }
}

# date + time combined
item "DateTime" {
  live {
    refresh      = "1s"
    update_label = "date '+%Y-%m-%d %H:%M'"
  }
}

# day of week + time
item "DayTime" {
  live {
    refresh      = "1s"
    update_label = "date '+%a %H:%M'"
  }
}

# ISO week number
item "Week" {
  live {
    refresh      = "3600s"
    update_label = "date '+W%V'"
  }
}

# independent clock — runs on its own timer, not the shared master tick.
# use when you want a precise 1s update without forcing all other live items
# to tick at 1s too (the master tick runs at the GCD of all refresh values).
item "ClockIndependent" {
  live {
    refresh      = "1s"
    independent  = true
    update_label = "date '+%H:%M:%S'"
  }
}

# --- system ---

# uptime (e.g. "3d 2h" or "47m")
item "Uptime" {
  live {
    refresh      = "60s"
    update_label = "uptime | awk '{print $3}' | tr -d ','"
  }
}

# --- exit code matching ---

item "ExitTest" {
  live {
    refresh      = "2s"
    update_label = ["sh", "-c", "exit 0"]
    on exit 0 { label = "OK" }
    on exit 1 { label = "FAIL" }
  }
}

# --- output substring matching ---

item "OutputTest" {
  live {
    refresh      = "2s"
    update_label = ["sh", "-c", "echo 'status: good'"]
    on output "status: good" { label = "GOOD" }
    on output "bad"          { label = "BAD" }
  }
}

# --- on block with command — fires once on state change ---

item "Service" {
  live {
    refresh      = "5s"
    update_label = ["sh", "-c", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080 2>/dev/null || echo fail"]
    on exit 0    { label = "UP" }
    on exit 1    { label = "DOWN" }
    on output "fail" {
      label   = "UNREACHABLE"
      command = "notify-send 'Service is down'"
    }
  }
}
