# live items with on blocks — label reacts to exit code or output
# on blocks fire their command only on state transition, not every tick

tray {
  icon    = "gensystray_default.png"
  tooltip = "Live + On Blocks"
}

# clock with click action
item "Clock" {
  command = ["xterm", "-e", "cal"]
  live {
    refresh      = "1s"
    update_label = "date '+%H:%M:%S'"
  }
}

# exit code matching
item "ExitTest" {
  live {
    refresh      = "2s"
    update_label = ["sh", "-c", "exit 0"]
    on exit 0 { label = "OK" }
    on exit 1 { label = "FAIL" }
  }
}

# output substring matching
item "OutputTest" {
  live {
    refresh      = "2s"
    update_label = ["sh", "-c", "echo 'status: good'"]
    on output "status: good" { label = "GOOD" }
    on output "bad"          { label = "BAD" }
  }
}

# on block with command — fires once on state change
item "Service" {
  live {
    refresh      = "5s"
    update_label = ["sh", "-c", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080 2>/dev/null || echo fail"]
    on exit 0    { label = "UP" }
    on exit 1    { label = "DOWN" }
    on output "fail" {
      label   = "UNREACHABLE"
      command = "notify-send 'Service is down'"
    }
  }
}
