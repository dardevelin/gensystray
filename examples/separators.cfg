# separators.cfg — test all separator modes
#
# separators control horizontal lines above/below expanded sections.
# values: true (default, both), "top", "bottom", "none", false (none)
#
# only applies to expanded sections (expanded = true).
# collapsed sections render as submenus and don't use separators.

tray {
    icon    = "dialog-information"
    tooltip = "Separator Test"
}

# --- top-level items (no section, always flat) ---

item "Top Level A" { command = "echo a" }
item "Top Level B" { command = "echo b" }

# --- item-level separator (inline -- convention) ---

item "--" { separator = true }

# --- expanded section: separators = true (default, both top and bottom) ---

section "Both (default)" {
    expanded   = true
    separators = true
    item "Both 1" { command = "echo both1" }
    item "Both 2" { command = "echo both2" }
}

# --- expanded section: separators = "top" ---

section "Top Only" {
    expanded   = true
    separators = "top"
    item "Top 1" { command = "echo top1" }
    item "Top 2" { command = "echo top2" }
}

# --- expanded section: separators = "bottom" ---

section "Bottom Only" {
    expanded   = true
    separators = "bottom"
    item "Bottom 1" { command = "echo bottom1" }
    item "Bottom 2" { command = "echo bottom2" }
}

# --- expanded section: separators = "none" ---

section "No Separators" {
    expanded   = true
    separators = "none"
    item "None 1" { command = "echo none1" }
    item "None 2" { command = "echo none2" }
}

# --- expanded section: separators = false (same as "none") ---

section "False Separators" {
    expanded   = true
    separators = false
    item "False 1" { command = "echo false1" }
    item "False 2" { command = "echo false2" }
}

# --- expanded section: no separators key (defaults to both) ---

section "Default (omitted)" {
    expanded = true
    item "Default 1" { command = "echo default1" }
    item "Default 2" { command = "echo default2" }
}

# --- collapsed section (submenu, separators don't apply) ---

section "Collapsed Submenu" {
    item "Sub 1" { command = "echo sub1" }
    item "Sub 2" { command = "echo sub2" }
}

# --- expanded section with show_label = false ---

section "Hidden Label" {
    expanded   = true
    show_label = false
    separators = true
    item "Hidden 1" { command = "echo hidden1" }
    item "Hidden 2" { command = "echo hidden2" }
}

# --- expanded section with show_label = true (default) ---

section "Visible Label" {
    expanded   = true
    show_label = true
    separators = "top"
    item "Visible 1" { command = "echo visible1" }
    item "Visible 2" { command = "echo visible2" }
}

# --- item-level separators mixed with section items ---

section "Mixed Separators" {
    expanded   = true
    separators = "none"
    item "A" { command = "echo a" }
    item "--" { separator = true }
    item "B" { command = "echo b" }
    item "--" { separator = true }
    item "C" { command = "echo c" }
}
