# all command forms — string, array, multi-command, heredoc

tray {
  icon    = "gensystray_default.png"
  tooltip = "Commands"
}

# string command — runs via $SHELL -c, falls back to sh
item "String" {
  command = "date >> /tmp/gensystray.log"
  order   = 1
}

# array command — direct exec, no shell
item "Array" {
  command = ["ls", "-la", "/tmp"]
  order   = 2
}

# multi-command — array of arrays, all run on click
item "Multi" {
  command = [
    ["sh", "-c", "echo 'step 1' >> /tmp/gensystray.log"],
    ["sh", "-c", "echo 'step 2' >> /tmp/gensystray.log"]
  ]
  order = 3
}

# heredoc with shebang — explicit interpreter per item
item "Script" {
  command = <<EOD
#!/usr/bin/env python3
import datetime
with open("/tmp/gensystray.log", "a") as f:
    f.write(str(datetime.datetime.now()) + "\n")
EOD
  order = 4
}
