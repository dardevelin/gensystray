# sections — group items into submenus or inline groups
# expanded = true renders items inline with separators
# expanded = false (default) renders as a submenu

tray {
  icon    = "gensystray_default.png"
  tooltip = "Sections"
}

item "Top Item" {
  command = "echo top"
}

# collapsed section — renders as a submenu
section "Tools" {
  item "Htop" {
    command = ["xterm", "-e", "htop"]
  }
  item "Logs" {
    command = ["xterm", "-e", "tail", "-f", "/var/log/syslog"]
  }
}

# expanded section — renders inline with separator above and below
section "Status" {
  expanded   = true
  separators = true
  show_label = true

  item "Clock" {
    live {
      refresh      = "1s"
      update_label = "date '+%H:%M:%S'"
    }
  }

  item "Uptime" {
    live {
      refresh      = "5s"
      update_label = "uptime | awk '{print $3}'"
    }
  }
}

# section with separator only on top
section "Quick Actions" {
  expanded   = true
  separators = "top"

  item "Reload" {
    command = "echo reload"
  }
}
