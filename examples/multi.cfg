# multi instance config — all config inside instance blocks
# nothing is allowed outside instance blocks
# start all:          gensystray
# start one:          gensystray --instance work

instance "work" {
  tray {
    icon    = "gensystray_default.png"
    tooltip = "Work"
  }

  item "Terminal" {
    command = ["xterm"]
    order   = 1
  }

  item "separator" {
    separator = true
    order     = 2
  }

  # multi-command — both run on click
  item "Build & Test" {
    command = [
      ["make", "build"],
      ["make", "test"]
    ]
    order = 3
  }
}

instance "personal" {
  tray {
    icon    = "gensystray_default.png"
    tooltip = "Personal"
  }

  item "Music" {
    command = ["spotify"]
  }

  item "separator" {
    separator = true
  }

  item "Files" {
    command = ["thunar"]
  }
}
