# multi instance config — all config inside instance blocks
# nothing is allowed outside instance blocks
# start all:          gensystray
# start one:          gensystray --instance work

instance "work" {
  tray {
    icon    = "/path/to/work.png"
    tooltip = "Work"
  }

  item "Terminal" {
    command = ["xterm"]
    order   = 1
  }

  item "separator" {
    separator = true
    order     = 2
  }

  # multi-command — both run on click
  item "Build & Test" {
    command = [
      ["make", "build"],
      ["make", "test"]
    ]
    order = 3
  }

  # live item with on blocks — label reacts to exit code
  section "Status" {
    expanded   = true
    separators = true

    item "Service" {
      live {
        refresh      = "5s"
        update_label = ["sh", "-c", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080 2>/dev/null || echo fail"]
        on exit 0   { label = "UP" }
        on exit 1   { label = "DOWN" }
        on output "fail" { label = "UNREACHABLE" }
      }
    }
  }
}

instance "personal" {
  tray {
    icon    = "/path/to/personal.png"
    tooltip = "Personal"
  }

  item "Music" {
    command = ["spotify"]
  }

  item "separator" {
    separator = true
  }

  item "Files" {
    command = ["thunar"]
  }
}
