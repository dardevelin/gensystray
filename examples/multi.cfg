# multi instance config — all config inside instance blocks
# nothing is allowed outside instance blocks
# start all:          gensystray
# start one:          gensystray --instance work

instance "work" {
  tray {
    icon    = "/path/to/work.png"
    tooltip = "Work"
  }

  item "Terminal" {
    command = ["xterm"]
  }

  item "Browser" {
    command = ["firefox"]
    order   = 1
  }

  item "separator" {
    separator = true
    order     = 2
  }

  item "Editor" {
    command = ["nvim"]
    order   = 3
  }

  ipc {
    socket = "/run/user/1000/gensystray-work.sock"
  }
}

instance "personal" {
  tray {
    icon    = "/path/to/personal.png"
    tooltip = "Personal"
  }

  item "Music" {
    command = ["spotify"]
  }

  item "separator" {
    separator = true
  }

  item "Files" {
    command = ["thunar"]
  }

  ipc {
    socket = "/run/user/1000/gensystray-personal.sock"
  }
}
