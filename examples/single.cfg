# single instance config — no instance blocks
# default location: $HOME/.config/gensystray/gensystray.cfg
# override with: GENSYSTRAY_PATH=/path/to/config.cfg

tray {
  icon    = "/path/to/icon.png"
  tooltip = "My Tray"
}

item "Terminal" {
  command = ["xterm"]
}

item "Browser" {
  command = ["firefox"]
  order   = 1
}

item "separator" {
  separator = true
  order     = 2
}

item "Editor" {
  command = ["nvim"]
  order   = 3
}
