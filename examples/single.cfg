# single instance config — no instance blocks
# default location: $HOME/.config/gensystray/gensystray.cfg
# override with: GENSYSTRAY_PATH=/path/to/config.cfg

tray {
  icon    = "gensystray_default.png"
  tooltip = "My Tray"
}

# string command — runs via $SHELL -c
item "Date" {
  command = "date >> /tmp/gensystray.log"
  order   = 1
}

# array command — direct exec, no shell
item "Terminal" {
  command = ["xterm"]
  order   = 2
}

item "separator" {
  separator = true
  order     = 3
}

# live item — label updates every second
item "Clock" {
  live {
    refresh      = "1s"
    update_label = "date '+%H:%M:%S'"
  }
  order = 4
}
